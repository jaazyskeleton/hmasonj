<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
</head>
<body style="font-family: 'Times New Roman', serif; color: #3e2723;">
    <div class="topbar">
        <h2 style="color: white;">H. Mason. J</h2>

        <button><a href="https://hmasonj.org/about.html" style="color: inherit; text-decoration: none;">About</a></button>
        <button><a href="https://hmasonj.org/books.html" style="color: inherit; text-decoration: none;">Books</a></button>
    </div>

    <div class="content" style="margin-top: 80px;">
        <h1>Books</h1>

        <div style="font-size: 1.5em; line-height: 1.8;">
            <hr style="margin: 2em 0; border: none; border-top: 2px solid #3e2723; opacity: 0.3;">
            <h2>On the Inside</h2>
            
            <div id="book-cover" style="cursor: pointer; position: relative; display: inline-block;">
                <img src="./images/On_the_Inside_Cover.png" alt="On the Inside book cover" style="max-width: 300px; margin: 1em 0; display: block;">
            </div>

            <br>
            <a href="#" onclick="return false;" style="cursor: not-allowed; opacity: 0.6; text-decoration: none; color: #3e2723;" title="Currently unavailable">
                PDF
            </a>
            
            <hr style="margin: 2em 0; border: none; border-top: 2px solid #3e2723; opacity: 0.3;">
        </div>

        <div style="font-size: 1.5em; line-height: 1.8;">
            <hr style="margin: 2em 0; border: none; border-top: 2px solid #3e2723; opacity: 0.3;">
            <h2>The Fabrication of my <span id="animated-text">Mind</span> | Volume 1</h2>

            <br>
            <a href="#" onclick="return false;" style="cursor: not-allowed; opacity: 0.6; text-decoration: none; color: #3e2723;" title="Currently unavailable">
                PDF
            </a>
            
            <hr style="margin: 2em 0; border: none; border-top: 2px solid #3e2723; opacity: 0.3;">
        </div>

        <script>
            const textSpan = document.getElementById('animated-text');
            const text = textSpan.textContent;
            const fonts = ['Arial', 'Georgia', 'Courier New', 'Verdana', 'Comic Sans MS', 'Impact'];
            
            textSpan.innerHTML = text.split('').map((char, i) => 
            `<span class="letter" data-index="${i}">${char}</span>`
            ).join('');
            
            document.querySelectorAll('.letter').forEach((letter, index) => {
            letter.style.fontVariant = 'numeric: tabular-nums';
            letter.style.display = 'inline-block';
            letter.style.width = '1.25ch';
            letter.style.height = '1em';
            letter.style.textAlign = 'center';
            letter.style.lineHeight = '1em';
            const delay = Math.random() * 2000;
            const duration = 2000 + Math.random() * 2000;
            
            setTimeout(() => {
            let fontIndex = 0;
            setInterval(() => {
            letter.style.fontFamily = fonts[fontIndex % fonts.length];
            fontIndex++;
            }, duration / fonts.length);
            }, delay);
            });
        </script>

        <div id="zoom-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow: hidden;">
            <div style="position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
                <img id="zoom-image" src="./images/On_the_Inside_Cover.png" alt="On the Inside book cover zoomed" style="max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;">
            </div>
            </div>

            <script>
            let zoomLevel = 1;
            const modal = document.getElementById('zoom-modal');
            const zoomImage = document.getElementById('zoom-image');
            let isPanned = false;
            
            document.getElementById('book-cover').addEventListener('click', () => {
                modal.style.display = 'flex';
                zoomLevel = 1;
                updateZoom();
            });
            
            modal.addEventListener('wheel', (e) => {
                e.preventDefault();
                zoomLevel += e.deltaY > 0 ? -0.1 : 0.1;
                zoomLevel = Math.max(1, Math.min(zoomLevel, 3));
                updateZoom();
            });
            
            modal.addEventListener('mousemove', (e) => {
                if(zoomLevel > 1) {
                const rect = zoomImage.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width * 100;
                const y = (e.clientY - rect.top) / rect.height * 100;
                zoomImage.style.transformOrigin = `${x}% ${y}%`;
                }
            });
            
            modal.addEventListener('click', () => {
                modal.style.display = 'none';
            });
            
            function updateZoom() {
                zoomImage.style.transform = `scale(${zoomLevel})`;
                zoomImage.style.cursor = zoomLevel > 1 ? 'grab' : 'zoom-in';
            }
            </script>
        </div>
    </div>

    <div class="footer">
        <h3>Contact Details</h3>
        <p>Email: henrymasonjames@hmasonj.org</p>
        <p>&copy; 2026. All rights reserved.</p>
    </div>

    <script type="module" src="./modules/import.js"></script>
</body>
</html>
